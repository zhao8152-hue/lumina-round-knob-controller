<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="250" cy="250" r="250" />
    </clipPath>
  </defs>
  <g clip-path="url(#circle-clip)">
    <!-- 顶部倾斜反射 -->
    <rect x="-50" y="-100" width="600" height="250" fill="url(#reflection)" transform="rotate(-15 250 250)" opacity="0.10" />
    <!-- 右下角模糊圆 -->
    <circle cx="375" cy="375" r="125" fill="url(#blur-spot)" opacity="0.10" />
    <!-- 边缘线 -->
    <circle cx="250" cy="250" r="249" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  </g>
  <defs>
    <linearGradient id="reflection" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="blur-spot">
      <stop offset="0%" stop-color="white" stop-opacity="0.15" />
      <stop offset="100%" stop-color="white" stop-opacity="0" />
    </radialGradient>
  </defs>
</svg>
